<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80">
  <style>
    .tmx-text { fill: #1a1a2e; font-family: 'Georgia', 'Times New Roman', serif; }
    .tmx-sub { fill: #666666; font-family: 'Georgia', 'Times New Roman', serif; }
    @media (prefers-color-scheme: dark) {
      .tmx-text { fill: #e0e0e0; }
      .tmx-sub { fill: rgba(255, 255, 255, 0.6); }
    }
  </style>
  <text class="tmx-text" x="100" y="42" text-anchor="middle" font-size="48" font-weight="700" letter-spacing="4">TMX</text>
  <text class="tmx-sub" x="100" y="64" text-anchor="middle" font-size="11" font-weight="400" letter-spacing="1.5">Tournament Management</text>
</svg>
